exp_name: TAMS_TVSum
model_name: TAMS
dataset: TVSum
graph_name: TVSum_30_0_vta
loss_name: bce_logit

protocol_mode: strict_main
score_level: frame
monitor_metric: joint
output_adapter: none

task_mode: generic
use_query: false
modalities: [v, t, a]
num_modality: 3
modality_dims: [1024, 768, 768]
use_text: true
use_audio: true

m2_visual_type: ca_gbt
m2_text_type: none
m2_audio_type: none

use_matl: true
use_ot_cma: true
use_directional_gnn: true
use_modality_gate: true

matl_scales: [5, 20, 50]
matl_temperature_init: 1.0
matl_temperature_final: 0.15
matl_temperature_epochs: 20
matl_freeze_epochs: 3

lambda_topo_sparse: 0.01
lambda_topo_div: 0.005
topo_rho_min: 0.3

sinkhorn_reg: 0.1
sinkhorn_iter: 8
ot_cma_topo_weight: 0.1
ot_cma_dropout: 0.15

interleaved_layers: 3
multi_scale_taus: [5, 20, 50]

use_rank_loss: true
rank_supervision: gtscore
lambda_rank: 0.25
lambda_list_mle: 0.15
rank_pairs_per_video: 256

channel1: 256
channel2: 128
final_dim: 1
num_att_heads: 0
dropout: 0.30

use_score_calibration: true
eval_temperature: 1.0
eval_center_logits: true

lr: 0.0005
wd: 0.0003
batch_size: 1
num_epoch: 60
save_checkpoint_interval: 5
k: 10
eps: 0.999
use_mean_sum: false

monitor_joint_w_f1: 0.3
monitor_joint_w_tau: 1.5
monitor_joint_w_rho: 1.5
joint_val_budget: 0.15

norm: true
t_emb: true
seed: 42
device: cuda:0
eval_type: VS_avg
use_amp: false
max_grad_norm: 0.5
